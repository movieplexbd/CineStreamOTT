name: Android CI/CD — Build & Release APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug & Signed Release APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          if [ -f "keystore/debug.keystore" ]; then
            cp keystore/debug.keystore ~/.android/debug.keystore
          else
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup release keystore
        run: |
          mkdir -p keystore
          if [ -n "$RELEASE_KEYSTORE_B64" ]; then
            echo "$RELEASE_KEYSTORE_B64" | base64 --decode > keystore/cinestream-release.jks
          else
            keytool -genkey -v \
              -keystore keystore/cinestream-release.jks \
              -alias cinestream_release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "CineStream@2024SecureBD" \
              -keypass "CineStream@2024SecureBD" \
              -dname "CN=CineStream,OU=MoviePlex,O=MoviePlexBD,L=Dhaka,S=Dhaka,C=BD"
          fi
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/cinestream-release.jks
          RELEASE_STORE_PASSWORD: CineStream@2024SecureBD
          RELEASE_KEY_ALIAS: cinestream_release
          RELEASE_KEY_PASSWORD: CineStream@2024SecureBD

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep -m 1 "versionName" app/build.gradle | sed "s/.*versionName\s*['\"]//;s/['\"].*//")
          VERSION_CODE=$(grep -m 1 "versionCode" app/build.gradle | sed 's/.*versionCode\s*//')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Rename and copy APKs
        run: |
          mkdir -p dist
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$DEBUG_APK"   dist/CineStream-v${{ steps.version.outputs.version_name }}-debug.apk
          cp "$RELEASE_APK" dist/CineStream-v${{ steps.version.outputs.version_name }}-release.apk

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CineStream-Debug-Build${{ github.run_number }}
          path: dist/CineStream-v${{ steps.version.outputs.version_name }}-debug.apk
          retention-days: 90

      - name: Upload Release APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CineStream-Release-Build${{ github.run_number }}
          path: dist/CineStream-v${{ steps.version.outputs.version_name }}-release.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}-build${{ github.run_number }}
          name: "CineStream v${{ steps.version.outputs.version_name }} (Build #${{ github.run_number }})"
          body: |
            ## CineStream v${{ steps.version.outputs.version_name }} — Build #${{ github.run_number }}

            ### এই বিল্ডে পরিবর্তন
            - Google Sign-In সম্পূর্ণ সরানো হয়েছে — শুধুমাত্র Email/Password login
            - অ্যাপ চালু হওয়ার সময় crash ঠিক করা হয়েছে
            - Data load করার সময় crash ঠিক করা হয়েছে
            - Firebase initialization আরও robust করা হয়েছে
            - Google Play Services dependency সরানো হয়েছে (অ্যাপ হালকা হয়েছে)

            ### APK ডাউনলোড
            | ফাইল | ধরন |
            |------|------|
            | `CineStream-v${{ steps.version.outputs.version_name }}-release.apk` | **Release (সুপারিশকৃত)** |
            | `CineStream-v${{ steps.version.outputs.version_name }}-debug.apk` | Debug |

            > **ইন্সটল করুন:** Settings → Security → Unknown Sources → Enable
            > 
            > **Direct link:** https://github.com/${{ github.repository }}/releases/latest
          files: |
            dist/CineStream-v${{ steps.version.outputs.version_name }}-release.apk
            dist/CineStream-v${{ steps.version.outputs.version_name }}-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          VER="${{ steps.version.outputs.version_name }}"
          echo "## CineStream Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          if [ -f "dist/CineStream-v${VER}-debug.apk" ]; then
            SZ=$(du -sh "dist/CineStream-v${VER}-debug.apk" | cut -f1)
            echo "| Debug APK ($SZ) | ✅ SUCCESS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Debug APK | ❌ FAILED |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "dist/CineStream-v${VER}-release.apk" ]; then
            SZ=$(du -sh "dist/CineStream-v${VER}-release.apk" | cut -f1)
            echo "| Release APK ($SZ) | ✅ SUCCESS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Release APK | ❌ FAILED |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Releases:** https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY
