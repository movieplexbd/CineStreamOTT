name: Android CI/CD — Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Signed Release APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          if [ -f "keystore/debug.keystore" ]; then
            cp keystore/debug.keystore ~/.android/debug.keystore
          else
            echo "Generating debug keystore..."
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup release keystore
        run: |
          mkdir -p keystore
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from secret..."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > keystore/cinestream-release.jks
          else
            echo "Generating new release keystore..."
            keytool -genkey -v \
              -keystore keystore/cinestream-release.jks \
              -alias cinestream_release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "CineStream@2024SecureBD" \
              -keypass "CineStream@2024SecureBD" \
              -dname "CN=CineStream,OU=MoviePlex,O=MoviePlexBD,L=Dhaka,S=Dhaka,C=BD"
          fi
          echo "Keystore ready."

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/cinestream-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD || 'CineStream@2024SecureBD' }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS || 'cinestream_release' }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'CineStream@2024SecureBD' }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK signing
        run: |
          echo "=== Verifying Release APK signature ==="
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner verify \
            --verbose app/build/outputs/apk/release/app-release.apk 2>&1 | head -10 || \
          echo "apksigner not available, skipping verification"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CineStream-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CineStream-Release-Signed-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90
          if-no-files-found: error

      - name: Build Summary
        if: success()
        run: |
          echo "## Build Successful — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Type | Signed |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CineStream-Debug-${{ github.run_number }} | Debug | Debug key |" >> $GITHUB_STEP_SUMMARY
          echo "| CineStream-Release-Signed-${{ github.run_number }} | Release | Release key |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download APKs from the Artifacts section above (valid 90 days)." >> $GITHUB_STEP_SUMMARY

      - name: Show APK sizes
        if: success()
        run: |
          echo "=== APK File Sizes ==="
          du -sh app/build/outputs/apk/debug/app-debug.apk 2>/dev/null || echo "Debug APK not found"
          du -sh app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "Release APK not found"
