name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore/cinestream-release.jks
            echo "Keystore decoded successfully"
          else
            echo "No keystore secret found, using debug signing"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m

      - name: Build Release APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEYSTORE_PATH: ../keystore/cinestream-release.jks

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CineStream-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: CineStream-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineStream v${{ github.run_number }}"
          body: |
            ## CineStream OTT App - Build ${{ github.run_number }}

            ### Changes in this build:
            - Premium access: lock icons removed instantly after upgrade (no reload needed)
            - Admin panel: upgrade AND downgrade users to/from premium instantly
            - Movie detail: actors shown in horizontal scrollable row with circular images
            - Download button: modern Google-style design with file size & real-time progress
            - Watchlist: per-user save, accessible from profile, modern UI
            - Player: clean centered play icon only (no text)
            - Smart lazy loading with infinite scroll
            - Strong caching & offline support

            ### Download
            Download the APK from the artifacts section above.
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
